{% extends "base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet"
href="{% static 'css/auth.css' %}">

<div class="auth-container">

<div class="auth-card">

<h2>Create Account</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button class="btn btn-auth">

Register

</button>

</form>

<div class="auth-footer">

Already have an account?

<a href="{% url 'login' %}">

Login

</a>

</div>

</div>

</div>

{% endblock %}
